judge_model: qwen3.5:35b
ollama_base_url: http://host.docker.internal:11434
default_n: 3
request_timeout_seconds: 120
judge_retry_count: 1
passthrough_models: true

models:
  bon/llama3.1:8b:
    base_model: llama3.1:8b
    n: 3
    sampling:
      temperature: 0.8
      top_p: 0.95

  bon/qwen2.5:14b:
    base_model: qwen2.5:14b
    n: 4
    sampling:
      temperature: 0.7

  bon/gemma4:
    base_model: gemma4
    n: 4
    sampling:
      temperature: 1.0
      top_p: 0.9

  bon-pool/coding:
    pool: coding
    n: 3

pools:
  coding:
    candidates:
      - model: qwen2.5-coder:14b
        count: 2
      - model: deepseek-coder:6.7b
        weight: 1
